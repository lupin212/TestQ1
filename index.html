<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tra cứu đáp án</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f7fb; color: #1f2937; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .hero, .filters, .card, .stats {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    .hero { padding: 24px; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .muted { color: #6b7280; }
    .stats-wrap {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 18px;
    }
    .stats { padding: 18px; text-align: center; }
    .stats strong { display: block; font-size: 28px; margin-top: 8px; }
    .filters { padding: 20px; margin-bottom: 20px; }
    .filter-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    input, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      background: #fff;
    }
    button {
      cursor: pointer;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-weight: 600;
      width: auto;
    }
    button.secondary {
      background: #eef2ff;
      color: #4338ca;
      border: 1px solid #c7d2fe;
    }
    .answers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .answer-chip {
      width: auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .answer-chip.active {
      background: #7c3aed;
      color: white;
      border-color: #7c3aed;
    }
    .list { display: grid; gap: 16px; }
    .card { padding: 20px; }
    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f3f4f6;
    }
    .badge.answer { background: #dcfce7; color: #166534; }
    .badge.type { background: #ede9fe; color: #5b21b6; }
    .badge.cat { background: #e0f2fe; color: #075985; }
    .badge.set { background: #fef3c7; color: #92400e; }
    .question { font-size: 18px; font-weight: 700; margin: 0 0 14px; }
    .option {
      display: flex;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      margin-bottom: 10px;
      background: #fff;
    }
    .option.correct {
      background: #ecfdf5;
      border-color: #86efac;
    }
    .opt-label {
      width: 28px;
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .option.correct .opt-label {
      background: #16a34a;
      color: #fff;
    }
    .empty {
      text-align: center;
      padding: 36px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    @media (max-width: 900px) {
      .stats-wrap { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Tra cứu đáp án</h1>
      <div class="muted">Bộ lọc theo nội dung câu hỏi hoặc đáp án.</div>
      <div class="stats-wrap">
        <div class="stats"><div class="muted">Tổng số câu</div><strong id="totalCount">0</strong></div>
        <div class="stats"><div class="muted">Kết quả lọc</div><strong id="resultCount">0</strong></div>
      </div>
    </div>

    <div class="filters">
      <div class="filter-grid">
        <input id="keyword" type="text" placeholder="Tìm theo nội dung câu hỏi hoặc đáp án..." />
      </div>
      <div class="answers" id="answerFilters"></div>
      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button id="resetBtn" class="secondary">Xóa bộ lọc</button>
      </div>
    </div>

    <div class="list" id="results"></div>
  </div>

      { id: 4, set: "Bộ cũ", category: "ATTT", type: "Một đáp án", question: "Máy tính VPS được phép kết nối Internet sử dụng các cách thức nào dưới đây?", options: ["Lắp đặt bổ sung card wifi hoặc USB wifi để kết nối wifi vào Internet", "Lắp USB DCOM và kết nối vào Internet sử dụng SIM data", "Kết nối với điện thoại di động và sử dụng chức năng chia sẻ Internet của điện thoại để vào Internet", "Cả 3 phương án trên đều không được phép"], correct: ["D"] },

    const keywordEl = document.getElementById('keyword');
    const resultsEl = document.getElementById('results');
    const totalCountEl = document.getElementById('totalCount');
    const resultCountEl = document.getElementById('resultCount');
    const answerFiltersEl = document.getElementById('answerFilters');
    const resetBtn = document.getElementById('resetBtn');

    const answerChoices = ["tat-ca", "A", "B", "C", "D", "A,B", "A,B,C"];
    let selectedAnswer = "tat-ca";

    function renderAnswerFilters() {
      answerFiltersEl.innerHTML = '';
      answerChoices.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'answer-chip' + (selectedAnswer === item ? ' active' : '');
        btn.textContent = item === 'tat-ca' ? 'Tất cả' : item;
        btn.onclick = () => {
          selectedAnswer = item;
          renderAnswerFilters();
          render();
        };
        answerFiltersEl.appendChild(btn);
      });
    }

    function getFiltered() {
      const keyword = keywordEl.value.trim().toLowerCase();

      return questions.filter(item => {
        const keywordMatch =
          !keyword ||
          item.question.toLowerCase().includes(keyword) ||
          item.options.some(opt => opt.toLowerCase().includes(keyword)) ||
          item.correct.join(',').toLowerCase().includes(keyword);

        const answerMatch = selectedAnswer === 'tat-ca' || item.correct.join(',') === selectedAnswer;

        return keywordMatch && answerMatch;
      });
    }

    function render() {
      const filtered = getFiltered();
      totalCountEl.textContent = questions.length;
      resultCountEl.textContent = filtered.length;
      resultsEl.innerHTML = '';

      if (!filtered.length) {
        resultsEl.innerHTML = '<div class="empty"><h3>Không tìm thấy kết quả phù hợp</h3><div class="muted">Thử thay đổi từ khóa hoặc đáp án.</div></div>';
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        const badges = document.createElement('div');
        badges.className = 'badges';
        badges.innerHTML = `
          <span class="badge">Câu ${item.id}</span>
          <span class="badge set">${item.set}</span>
          <span class="badge cat">${item.category}</span>
          <span class="badge type">${item.type}</span>
          <span class="badge answer">Đáp án: ${item.correct.join(', ')}</span>
        `;

        const title = document.createElement('div');
        title.className = 'question';
        title.textContent = item.question;

        card.appendChild(badges);
        card.appendChild(title);

        item.options.forEach((opt, index) => {
          const label = String.fromCharCode(65 + index);
          const row = document.createElement('div');
          row.className = 'option' + (item.correct.includes(label) ? ' correct' : '');
          row.innerHTML = `
            <div class="opt-label">${label}</div>
            <div>${opt}</div>
          `;
          card.appendChild(row);
        });

        resultsEl.appendChild(card);
      });
    }

    keywordEl.addEventListener('input', render);
    resetBtn.addEventListener('click', () => {
      keywordEl.value = '';
      selectedAnswer = 'tat-ca';
      renderAnswerFilters();
      render();
    });

    renderAnswerFilters();
    render();
  </script>
